<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📝 标注组件演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .demo-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        .demo-header {
            padding: 24px 32px;
            background: #f8fafc;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .demo-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .demo-header h1 span {
            background: #4f6bff;
            color: white;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .demo-header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #4f6bff;
            color: white;
            box-shadow: 0 4px 12px rgba(79, 107, 255, 0.3);
        }

        .btn-primary:hover {
            background: #3b5bff;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .target-area {
            padding: 40px 32px 32px;
            min-height: 380px;
        }

        .target-area .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .target-area .content-card {
            background: #f8fafc;
            padding: 24px 20px;
            border-radius: 12px;
            border: 2px solid #e9edf2;
            text-align: center;
        }

        .target-area .content-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .target-area .content-card .label {
            font-size: 14px;
            font-weight: 500;
            color: #0f172a;
        }

        .target-area .content-card .desc {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .target-area .feature-badge {
            display: inline-block;
            background: #eef2ff;
            color: #4f6bff;
            font-size: 12px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .target-area .title-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .target-area .title-section h2 {
            font-size: 20px;
            font-weight: 600;
            color: #0f172a;
        }

        .target-area .title-section .badge {
            font-size: 13px;
            color: #64748b;
            background: #f1f5f9;
            padding: 4px 14px;
            border-radius: 20px;
        }

        .status-bar {
            padding: 12px 32px;
            background: #f8fafc;
            border-top: 1px solid #e9edf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 14px;
            color: #475569;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-dot.idle {
            background: #94a3b8;
        }

        .status-dot.active {
            background: #22c55e;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
