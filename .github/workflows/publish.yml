name: Publish to npm

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境，并自动安装/启用 pnpm
      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          # 关键：通过 cache: 'pnpm' 告诉 setup-node 使用 pnpm，
          # 它会自动安装 pnpm 并将其添加到 PATH，同时设置缓存
          cache: 'pnpm'

      # 3. 安装依赖（现在 pnpm 命令可用了）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. 构建项目
      - name: Build
        run: pnpm run build

      # 5. （可选）运行测试
      # - name: Run tests
      #   run: pnpm test

      # 6. 发布到 npm
      - name: Publish to npm
        if: github.event_name == 'release'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}