name: Publish to npm

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      # 2. 设置 Node.js 环境，并自动安装/启用 pnpm
      - name: Setup Node.js 
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # 3. 安装依赖（现在 pnpm 命令可用了）
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. 构建项目
      - name: Build
        run: pnpm run build

      # 5. （可选）运行测试
      # - name: Run tests
      #   run: pnpm test

      # 6. 发布到 npm
      - name: Publish to npm
        if: github.event_name == 'release'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}