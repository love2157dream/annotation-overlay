name: Publish to npm

# 触发条件：创建 Release 或推送 v* 格式的标签
on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码：使用最新的 v4 版本，提高性能和安全性
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境：使用最新 v4，并指定 Node.js 版本
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 使用 Node.js 20 (LTS)，你也可以改为 '18' 或 '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm' # 启用 pnpm 缓存

      # 3. 安装 pnpm：使用官方最新 action，支持锁文件缓存
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9  # 使用 pnpm v9（当前最新主要版本），也可以指定具体版本如 '9.15.0'
          run_install: false  # 避免重复安装

      # 4. 安装依赖：--frozen-lockfile 确保锁文件不被更新，与本地完全一致
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 构建项目：根据你 package.json 中的 scripts 名称来调整
      - name: Build
        run: pnpm run build

      # 6. （可选）运行测试：如有测试命令，取消注释并调整
      # - name: Run tests
      #   run: pnpm test

      # 7. 发布到 npm：仅在通过 Release 触发时执行，使用 NPM_TOKEN 进行认证
      - name: Publish to npm
        if: github.event_name == 'release'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}